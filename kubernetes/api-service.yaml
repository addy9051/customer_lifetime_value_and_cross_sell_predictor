apiVersion: v1
kind: Service
metadata:
  name: clv-inference-service
  namespace: amex-gbt-ml
  labels:
    app: clv-predictor
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: clv-predictor
    component: api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clv-api-ingress
  namespace: amex-gbt-ml
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
  - host: ml-api.amexgbt.internal
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: clv-inference-service
            port:
              number: 80
