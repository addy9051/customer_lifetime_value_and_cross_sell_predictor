services:
  # -------------------------------------------------------
  # MLflow Tracking Server
  # -------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: clv-mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  # -------------------------------------------------------
  # FastAPI Inference Service (simulating EKS)
  # -------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: clv-api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - ARTIFACTS_DIR=/app/models/artifacts
      - DATA_DIR=/app/data
    env_file:
      - .env
    volumes:
      - ./models/artifacts:/app/models/artifacts:ro
      - ./data/features:/app/data/features:ro
    depends_on:
      - mlflow
    restart: unless-stopped

  # -------------------------------------------------------
  # Streamlit Dashboard
  # -------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: clv-dashboard
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
      - FEATURES_PATH=/app/data/features/account_features.parquet
      - SEGMENTS_PATH=/app/models/artifacts/segmentation/account_segments.parquet
      - CHURN_PATH=/app/models/artifacts/survival/churn_risk_predictions.parquet
      - RECS_PATH=/app/models/artifacts/cross_sell/account_recommendations.parquet
      - PROBA_PATH=/app/models/artifacts/cross_sell/cross_sell_probabilities.parquet
      - CLV_METRICS_PATH=/app/models/artifacts/clv/model_comparison.csv
    volumes:
      - ./models/artifacts:/app/models/artifacts:ro
      - ./data/features:/app/data/features:ro
    depends_on:
      - api
    restart: unless-stopped

  # -------------------------------------------------------
  # Prometheus (metrics collection)
  # -------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: clv-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
    restart: unless-stopped

  # -------------------------------------------------------
  # Grafana (dashboards)
  # -------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.0
    container_name: clv-grafana
    ports:
      - "3000:3000"
    environment:
      # SECURITY: Password sourced from .env, not hardcoded (VULN-008, VULN-013)
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # -------------------------------------------------------
  # Airflow Stack (Management & Orchestration)
  # -------------------------------------------------------
  postgres:
    image: postgres:13
    container_name: clv-postgres
    environment:
      # SECURITY: Credentials sourced from .env variables (VULN-008)
      - POSTGRES_USER=${AIRFLOW_POSTGRES_USER:-airflow}
      - POSTGRES_PASSWORD=${AIRFLOW_POSTGRES_PASSWORD:?Set AIRFLOW_POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=${AIRFLOW_POSTGRES_DB:-airflow}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U airflow" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: clv-redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: clv-airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      # SECURITY: Use env var references for DB credentials (VULN-008)
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:?err}@postgres/${AIRFLOW_POSTGRES_DB:-airflow}
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:?err}@postgres/${AIRFLOW_POSTGRES_DB:-airflow}
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/1
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYTHONPATH=/opt/airflow/project
      # SECURITY: Only inject specific secrets needed, not blanket .env (VULN-008)
      - SNOWFLAKE_ACCOUNT=${SNOWFLAKE_ACCOUNT}
      - SNOWFLAKE_USER=${SNOWFLAKE_USER}
      - SNOWFLAKE_PASSWORD=${SNOWFLAKE_PASSWORD}
      - SNOWFLAKE_DATABASE=${SNOWFLAKE_DATABASE}
      - SNOWFLAKE_WAREHOUSE=${SNOWFLAKE_WAREHOUSE}
      - DATABRICKS_HOST=${DATABRICKS_HOST}
      - DATABRICKS_TOKEN=${DATABRICKS_TOKEN}
    volumes:
      # SECURITY: Mount only dags/ and specific code dirs, NOT entire project (VULN-008)
      - ./airflow/dags:/opt/airflow/dags
      - ./models:/opt/airflow/project/models:ro
      - ./features:/opt/airflow/project/features:ro
      - ./data:/opt/airflow/project/data
    ports:
      - "8081:8080"
    command: webserver
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: clv-airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:?err}@postgres/${AIRFLOW_POSTGRES_DB:-airflow}
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:?err}@postgres/${AIRFLOW_POSTGRES_DB:-airflow}
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/1
      - PYTHONPATH=/opt/airflow/project
      - GIT_PYTHON_REFRESH=quiet
      - SNOWFLAKE_ACCOUNT=${SNOWFLAKE_ACCOUNT}
      - SNOWFLAKE_USER=${SNOWFLAKE_USER}
      - SNOWFLAKE_PASSWORD=${SNOWFLAKE_PASSWORD}
      - SNOWFLAKE_DATABASE=${SNOWFLAKE_DATABASE}
      - SNOWFLAKE_WAREHOUSE=${SNOWFLAKE_WAREHOUSE}
      - DATABRICKS_HOST=${DATABRICKS_HOST}
      - DATABRICKS_TOKEN=${DATABRICKS_TOKEN}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./models:/opt/airflow/project/models:ro
      - ./features:/opt/airflow/project/features:ro
      - ./data:/opt/airflow/project/data
    command: scheduler
    restart: unless-stopped

  airflow-worker:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: clv-airflow-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:?err}@postgres/${AIRFLOW_POSTGRES_DB:-airflow}
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:?err}@postgres/${AIRFLOW_POSTGRES_DB:-airflow}
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/1
      - PYTHONPATH=/opt/airflow/project
      - GIT_PYTHON_REFRESH=quiet
      - MLFLOW_RECORD_ENV_VARS_IN_MODEL_LOGGING=false
      - SNOWFLAKE_ACCOUNT=${SNOWFLAKE_ACCOUNT}
      - SNOWFLAKE_USER=${SNOWFLAKE_USER}
      - SNOWFLAKE_PASSWORD=${SNOWFLAKE_PASSWORD}
      - SNOWFLAKE_DATABASE=${SNOWFLAKE_DATABASE}
      - SNOWFLAKE_WAREHOUSE=${SNOWFLAKE_WAREHOUSE}
      - DATABRICKS_HOST=${DATABRICKS_HOST}
      - DATABRICKS_TOKEN=${DATABRICKS_TOKEN}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./models:/opt/airflow/project/models:ro
      - ./features:/opt/airflow/project/features:ro
      - ./data:/opt/airflow/project/data
    command: celery worker
    restart: unless-stopped

  # Initialize the DB (Runs once and exits)
  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: clv-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:?err}@postgres/${AIRFLOW_POSTGRES_DB:-airflow}
    # SECURITY: Use env var for Airflow admin password (VULN-008)
    command: >-
      bash -c "airflow db migrate &&
      airflow users create
      --username admin
      --firstname admin
      --lastname admin
      --role Admin
      --email admin@example.com
      --password $${AIRFLOW_ADMIN_PASSWORD:-changeme}"
    volumes:
      - ./airflow/dags:/opt/airflow/dags

  pgadmin:
    image: dpage/pgadmin4:8.4
    container_name: clv-pgadmin
    environment:
      # SECURITY: Credentials from .env (VULN-008)
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@admin.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:?Set PGADMIN_PASSWORD in .env}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

  # -------------------------------------------------------
  # n8n (Low-Code Workflow Orchestration)
  # -------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: clv-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_DISABLED=${N8N_USER_MANAGEMENT_DISABLED:-true}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${N8N_POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${AIRFLOW_POSTGRES_USER:-airflow}
      - DB_POSTGRESDB_PASSWORD=${AIRFLOW_POSTGRES_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mlflow_data:
  grafana_data:
  postgres_data:
  n8n_data:


