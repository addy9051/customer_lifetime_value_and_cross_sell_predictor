version: "3.8"

services:
  # -------------------------------------------------------
  # MLflow Tracking Server
  # -------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: clv-mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  # -------------------------------------------------------
  # FastAPI Inference Service (simulating EKS)
  # -------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: clv-api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - ARTIFACTS_DIR=/app/models/artifacts
      - DATA_DIR=/app/data
    volumes:
      - ./models/artifacts:/app/models/artifacts:ro
      - ./data/features:/app/data/features:ro
    depends_on:
      - mlflow
    restart: unless-stopped

  # -------------------------------------------------------
  # Streamlit Dashboard
  # -------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: clv-dashboard
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
      - FEATURES_PATH=/app/data/features/account_features.parquet
      - SEGMENTS_PATH=/app/models/artifacts/segmentation/account_segments.parquet
      - CHURN_PATH=/app/models/artifacts/survival/churn_risk_predictions.parquet
      - RECS_PATH=/app/models/artifacts/cross_sell/account_recommendations.parquet
      - PROBA_PATH=/app/models/artifacts/cross_sell/cross_sell_probabilities.parquet
      - CLV_METRICS_PATH=/app/models/artifacts/clv/model_comparison.csv
    volumes:
      - ./models/artifacts:/app/models/artifacts:ro
      - ./data/features:/app/data/features:ro
    depends_on:
      - api
    restart: unless-stopped

  # -------------------------------------------------------
  # Prometheus (metrics collection)
  # -------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: clv-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
    restart: unless-stopped

  # -------------------------------------------------------
  # Grafana (dashboards)
  # -------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.0
    container_name: clv-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # -------------------------------------------------------
  # Airflow Stack (Management & Orchestration)
  # -------------------------------------------------------
  postgres:
    image: postgres:13
    container_name: clv-postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U airflow" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: clv-redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: clv-airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@postgres/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/1
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYTHONPATH=/opt/airflow/project
    env_file: .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/airflow/project
    ports:
      - "8081:8080"
    command: webserver
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: clv-airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@postgres/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/1
      - PYTHONPATH=/opt/airflow/project
    env_file: .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/airflow/project
    command: scheduler
    restart: unless-stopped

  airflow-worker:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: clv-airflow-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@postgres/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/1
      - PYTHONPATH=/opt/airflow/project
    env_file: .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/airflow/project
    command: celery worker
    restart: unless-stopped

  # Initialize the DB (Runs once and exits)
  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: clv-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    command: db migrate && airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin
    volumes:
      - .:/opt/airflow/project

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: clv-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  mlflow_data:
  grafana_data:
  postgres_data:


