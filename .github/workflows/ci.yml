name: CI — CLV & Cross-Sell Predictor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  AIRFLOW_VERSION: "2.8.4"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        run: python -m pip install --upgrade pip ruff==0.4.2

      - name: Lint
        run: ruff check . --output-format=github

      - name: Format check
        run: ruff format --check .

  security:
    name: Security Scan — App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install app dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check dependency consistency
        run: python -m pip check
      
      - name: Debug resolved package versions
        run: |
          python -m pip show pyOpenSSL
          python -m pip show snowflake-connector-python
          python -m pip show cryptography
          python -m pip freeze | grep -Ei "pyopenssl|snowflake|cryptography|fastapi|starlette"
          
      - name: Debug security package versions
        run: |
          python -m pip show pyOpenSSL
          python -m pip show snowflake-connector-python
          python -m pip freeze | grep -Ei "pyopenssl|snowflake|cryptography"

      - name: pip-audit (CVE scan)
        run: python -m pip_audit --strict --desc

      - name: safety check
        run: safety check --full-report
        continue-on-error: true

      - name: Check for hardcoded secrets
        shell: bash
        run: |
          echo "Checking for potential secrets in tracked files..."

          if git ls-files --error-unmatch terraform/terraform.tfstate 2>/dev/null; then
            echo "::error::terraform.tfstate is tracked in Git! This exposes infrastructure secrets."
            exit 1
          fi

          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "::error::.env is tracked in Git! This exposes credentials."
            exit 1
          fi

          echo "✅ No tracked secret files found."

  airflow:
    name: Validate Airflow DAGs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Airflow core with constraints
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "apache-airflow==${AIRFLOW_VERSION}" \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_VERSION}.txt"

      - name: Check Airflow dependency consistency
        run: python -m pip check

      - name: Initialize Airflow metadata DB
        env:
          AIRFLOW_HOME: ${{ github.workspace }}/.airflow
          AIRFLOW__CORE__LOAD_EXAMPLES: "False"
          AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/airflow/dags
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p "$AIRFLOW_HOME"
          airflow db init

      - name: List DAGs
        env:
          AIRFLOW_HOME: ${{ github.workspace }}/.airflow
          AIRFLOW__CORE__LOAD_EXAMPLES: "False"
          AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/airflow/dags
          PYTHONPATH: ${{ github.workspace }}
        run: airflow dags list

      - name: Check DAG import errors
        env:
          AIRFLOW_HOME: ${{ github.workspace }}/.airflow
          AIRFLOW__CORE__LOAD_EXAMPLES: "False"
          AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/airflow/dags
          PYTHONPATH: ${{ github.workspace }}
        shell: bash
        run: |
          output="$(airflow dags list-import-errors || true)"
          echo "$output"

          if echo "$output" | grep -qiE "(error|traceback|failed)"; then
            echo "::error::Airflow DAG import errors detected."
            exit 1
          fi

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, security]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install app dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: pytest api/tests/ -v --tb=short

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f api/Dockerfile -t clv-api:test .

      - name: Build Dashboard image
        run: docker build -f dashboard/Dockerfile -t clv-dashboard:test .

      - name: Build Airflow image
        run: docker build -f airflow/Dockerfile -t clv-airflow:test .

      - name: Verify non-root user (API)
        shell: bash
        run: |
          USER_NAME=$(docker run --rm clv-api:test whoami)
          if [ "$USER_NAME" = "root" ]; then
            echo "::error::API container runs as root!"
            exit 1
          fi
          echo "✅ API container runs as: $USER_NAME"

      - name: Verify non-root user (Dashboard)
        shell: bash
        run: |
          USER_NAME=$(docker run --rm clv-dashboard:test whoami)
          if [ "$USER_NAME" = "root" ]; then
            echo "::error::Dashboard container runs as root!"
            exit 1
          fi
          echo "✅ Dashboard container runs as: $USER_NAME"

      - name: Verify non-root user (Airflow)
        shell: bash
        run: |
          USER_NAME=$(docker run --rm clv-airflow:test whoami)
          if [ "$USER_NAME" = "root" ]; then
            echo "::error::Airflow container runs as root!"
            exit 1
          fi
          echo "✅ Airflow container runs as: $USER_NAME"